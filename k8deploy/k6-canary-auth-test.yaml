apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-canary-auth-script
  namespace: default
data:
  canary-auth-test.js: |
    import http from 'k6/http';
    import { sleep, check, group } from 'k6';
    import { Rate, Counter, Trend } from 'k6/metrics';

    const BASE_URL = 'http://34.122.199.244.nip.io';

    const auth500Rate   = new Rate('auth_5xx_rate');
    const auth302Rate   = new Rate('auth_redirect_rate');
    const loginSuccess  = new Counter('login_success');
    const loginFail5xx  = new Counter('login_fail_5xx');
    const loginFail4xx  = new Counter('login_fail_redirect');
    const signupSuccess = new Counter('signup_success');
    const signupFail5xx = new Counter('signup_fail_5xx');
    const authLatency   = new Trend('auth_latency_ms', true);

    export const options = {
      scenarios: {
        valid_auth_flow: {
          executor: 'ramping-vus',
          startVUs: 0,
          stages: [
            { duration: '30s', target: 20 },
            { duration: '2m',  target: 20 },
            { duration: '30s', target: 0  },
          ],
          exec: 'validAuthFlow',
          tags: { scenario: 'valid_auth' },
        },
        bad_credentials: {
          executor: 'constant-arrival-rate',
          rate: 10,
          timeUnit: '1s',
          duration: '3m',
          preAllocatedVUs: 15,
          exec: 'badCredentials',
          tags: { scenario: 'bad_creds' },
        },
        chaos_auth_events: {
          executor: 'constant-arrival-rate',
          rate: 3,
          timeUnit: '5s',
          duration: '3m',
          preAllocatedVUs: 3,
          exec: 'chaosAuthEvents',
          tags: { scenario: 'chaos' },
        },
      },
      thresholds: {
        http_req_duration: ['p(95)<5000'],
        auth_5xx_rate:     ['rate<0.5'],
      },
    };

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function randFloat(min, max) { return Math.random() * (max - min) + min; }

    function classifyAuthResponse(res, operation) {
      authLatency.add(res.timings.duration);
      const is5xx = res.status >= 500;
      const is3xx = res.status >= 300 && res.status < 400;
      const is2xx = res.status >= 200 && res.status < 300;
      auth500Rate.add(is5xx);
      auth302Rate.add(is3xx || is2xx);
      if (operation === 'login') {
        if (is5xx)      loginFail5xx.add(1);
        else if (is3xx) loginFail4xx.add(1);
        else if (is2xx) loginSuccess.add(1);
      }
      if (operation === 'signup') {
        if (is5xx) signupFail5xx.add(1);
        else       signupSuccess.add(1);
      }
      return { is5xx, is3xx, is2xx };
    }

    export function validAuthFlow() {
      const jar    = http.cookieJar();
      const params = { jar, redirects: 5, tags: { flow: 'valid_auth' } };
      const email    = `canary_test_${__VU}_${__ITER}@loadtest.io`;
      const password = 'ValidPass123!';

      group('signup', () => {
        http.get(`${BASE_URL}/auth/signup`, params);
        sleep(randFloat(0.3, 0.8));
        const res = http.post(`${BASE_URL}/auth/signup`,
          { name: `Canary User ${__VU}`, email, password, confirmPassword: password },
          params
        );
        const { is5xx } = classifyAuthResponse(res, 'signup');
        check(res, {
          'signup: not 5xx (v2 broken if fails)': (r) => r.status < 500,
          'signup: success redirect or page':     (r) => r.status === 200 || r.status === 302,
        });
        if (is5xx) console.log(`[v2-hit] signup 5xx VU=${__VU} ITER=${__ITER} status=${res.status}`);
      });

      sleep(randFloat(0.5, 1.5));

      group('login_valid', () => {
        http.get(`${BASE_URL}/auth/login`, params);
        sleep(randFloat(0.3, 0.8));
        const res = http.post(`${BASE_URL}/auth/login`, { email, password }, params);
        const { is5xx } = classifyAuthResponse(res, 'login');
        check(res, {
          'login: not 5xx (v2 broken if fails)': (r) => r.status < 500,
          'login: reached destination':          (r) => r.status === 200 || r.status === 302,
        });
        if (is5xx) console.log(`[v2-hit] login 5xx VU=${__VU} ITER=${__ITER} status=${res.status}`);
      });

      sleep(randFloat(0.5, 1.5));

      group('logout', () => { http.get(`${BASE_URL}/auth/logout`, params); });
      sleep(randFloat(1, 2));
    }

    export function badCredentials() {
      const params = { redirects: 0, tags: { flow: 'bad_creds' } };
      const fakeEmails    = [`fake_${__VU}@nowhere.com`, 'admin@admin.com', 'test@test.com', `user${Math.floor(Math.random()*9999)}@example.com`];
      const wrongPasswords = ['wrongpassword', '123456', 'password', 'letmein', ''];

      group('bad_login', () => {
        const res = http.post(`${BASE_URL}/auth/login`,
          { email: pick(fakeEmails), password: pick(wrongPasswords) },
          params
        );
        const { is5xx, is3xx } = classifyAuthResponse(res, 'login');
        check(res, {
          'v1: bad creds → 302 redirect': (r) => !is5xx && is3xx,
          'not a 5xx (v2 broken if fails)': (r) => !is5xx,
        });
      });

      sleep(randFloat(0.1, 0.5));
    }

    export function chaosAuthEvents() {
      const events = [
        { level: 'ERROR', category: 'auth',         event: 'auth.login.5xx_spike',    message: 'Login endpoint returning 500 — v2 FAIL_MODE=auth active' },
        { level: 'ERROR', category: 'auth',         event: 'auth.signup.failed',      message: 'Signup rejected by failure injection on v2' },
        { level: 'WARN',  category: 'auth',         event: 'auth.canary.degraded',    message: 'Canary v2 auth routes degraded — rollback may trigger' },
        { level: 'WARN',  category: 'user_session', event: 'auth.session.blocked',    message: 'Session creation blocked by FAIL_MODE on v2 pod' },
        { level: 'ERROR', category: 'system',       event: 'canary.error_rate.high',  message: 'Error rate on v2 above threshold — canary controller evaluating rollback' },
      ];
      const e = pick(events);
      const url = `${BASE_URL}/auth/chaos/log`
        + `?level=${e.level}`
        + `&category=${encodeURIComponent(e.category)}`
        + `&event=${encodeURIComponent(e.event)}`
        + `&message=${encodeURIComponent(e.message)}`;
      const res = http.get(url, { tags: { flow: 'chaos' } });
      check(res, { 'chaos log accepted': (r) => r.status === 200 });
      sleep(1);
    }

    export function handleSummary(data) {
      const m = data.metrics;
      const get = (key, field) => m[key] ? m[key].values[field] || 0 : 0;
      const total5xx   = get('login_fail_5xx', 'count');
      const totalRedir = get('login_fail_redirect', 'count');
      const totalOk    = get('login_success', 'count');
      const signupOk   = get('signup_success', 'count');
      const signup5xx  = get('signup_fail_5xx', 'count');
      const rate5xx    = get('auth_5xx_rate', 'rate');
      const p95        = get('auth_latency_ms', 'p(95)');
      const totalReqs  = get('http_reqs', 'count');

      const out = [
        '=== CANARY v2 AUTH TEST SUMMARY ===',
        'Total HTTP requests: ' + totalReqs,
        '== LOGIN ==',
        '  Success (200/302): ' + totalOk,
        '  Rejected -> 302 v1: ' + totalRedir,
        '  Broken  -> 500  v2: ' + total5xx,
        '== SIGNUP ==',
        '  Success: ' + signupOk,
        '  Broken  -> 500  v2: ' + signup5xx,
        '== RATES ==',
        '  auth_5xx_rate: ' + (rate5xx*100).toFixed(1) + '%  (expect ~10% if only v2 broken)',
        '  auth p95 latency: ' + p95.toFixed(0) + 'ms',
        '== GRAFANA QUERIES ==',
        '  {app="trendtrove-app-v2", level="ERROR"}',
        '  {service="app-service-v2"} | json | event=~"auth.*"',
        '  rate(http_requests_total{status_code=~"5..",service="app-service-v2"}[1m])',
        '===================================',
      ].join('\n');
      console.log(out);
      return { stdout: out };
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-canary-auth-test
  namespace: default
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.54.0
          args:
            - run
            - /scripts/canary-auth-test.js
            - --out
            - json=/tmp/k6-results.json
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: k6-canary-auth-script
